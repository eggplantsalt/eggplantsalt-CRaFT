# Baseline 训练配置
# 标准的 Pi0-fast 微调，不使用任何 CRaFT 约束

policy:
  path: lerobot/pi0fast-base  # 官方预训练模型
  repo_id: local/pi0fast_baseline  # 本地占位符
  device: cuda
  use_amp: false

env:
  type: libero
  task: libero_spatial  # 通过 env.task 过滤数据集

dataset:
  repo_id: lerobot/libero  # 使用全量数据集，通过 env.task 自动过滤
  use_imagenet_stats: false  # 禁用 ImageNet 统计信息覆盖

# 键名映射：将 LIBERO 数据集的相机键名映射到 Pi0Fast 期望的键名
# 注意：这里的映射是 数据集键名 -> 模型期望键名
rename_map:
  observation.images.agentview_rgb: observation.images.image
  observation.images.eye_in_hand_rgb: observation.images.image2

# 训练参数
output_dir: experiments/cross_suite_generalization/outputs/baseline_spatial
steps: 10000
batch_size: 32
num_workers: 4
seed: 42

# 评估和保存
eval_freq: 2000
save_freq: 2000
log_freq: 100
save_checkpoint: true

# 优化器
optimizer:
  type: adamw
  lr: 1.0e-5
  weight_decay: 0.01

# 学习率调度器
scheduler:
  type: cosine
  warmup_steps: 500

